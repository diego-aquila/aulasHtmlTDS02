<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabelas em HTML</title>
  </head>
  <body>
    <table border="1">
      <caption>
        Lista de Pessoas
      </caption>
      <!-- Tabela -->
      <thead>
        <!-- Cabeçalho da tabela -->
        <tr>
          <!-- Linha do cabeçalho -->
          <th>Nome</th>
          <!-- Coluna do cabeçalho -->
          <th>Idade</th>
          <!-- Coluna do cabeçalho -->
          <th>Cidade</th>
          <!-- Coluna do cabeçalho -->
        </tr>
      </thead>
      <tbody>
        <!-- Corpo da tabela -->
        <tr>
          <!-- Linha do corpo -->
          <td>Diego</td>
          <!--  Coluna 1 do corpo -->
          <td>40</td>
          <!--  Coluna 2 do corpo -->
          <td>São Paulo</td>
          <!--  Coluna 3 do corpo -->
        </tr>

        <tr>
          <!-- Nova Linha do corpo -->
          <td>Jefferson</td>
          <td>31</td>
          <td>São Paulo</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <!-- Célula que ocupa todas as 3 colunas -->
          <td colspan="2">Total de pessoas</td>
          <td>2</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
