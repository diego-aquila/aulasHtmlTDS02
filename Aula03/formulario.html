<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulários HTML</title>
  </head>
  <body>
    <form
      name="cadastroForm"
      action="/processarDados"
      method="post"
      autocomplete="on"
    >
      <!-- Rótulo para o campo de nome -->
      <label for="nome">Nome:</label>
      <!--Campo de texto para inserção de dados -->
      <input required type="text" name="nome" id="nome" />

      <br />

      <!-- Required torna o campo obrigatório -->

      <label for="nome">Email:</label>
      <input
        required
        type="email"
        name="email"
        id=""
        placeholder="Ex.: email@dominio.com"
      />

      <br />
      <label for="nome">Telefone:</label>
      <input type="tel" name="tel" id="" placeholder="(xx) xxxxx-xxxx" />

      <br />
      <!-- Type password oculta os caracteres digitados -->

      <label for="senha">Senha:</label>
      <input maxlength="5" type="password" name="senha" id="senha" />

      <br />
      <label for="idade">Idade:</label>
      <input type="number" name="idade" id="idade" />

      <br />

      <!-- Type date usado para seleção de datas -->

      <label for="nascimento">Nascimento:</label>

      <input type="date" name="nascimento" id="" />

      <br />
      <label for="nascimento">Hora:</label>
      <input type="time" name="horario" id="horario" />
      <br />

      <!-- Type color usado para seleção de cores -->

      <label for="color">Cor:</label>
      <input type="color" name="color" id="color" />

      <br />
      <label for="range">Range:</label>
      <input
        oninput="this.nextElementSibling.textContent = this.value"
        type="range"
        min="0"
        max="100"
        value="25"
        name="range"
        id="range"
      />
      <h1>25</h1>

      <br />

      <!-- Type file usado para seleção de arquivos -->
      <input type="file" accept="image/*" name="file" id="file" />

      <!-- Type reset usado para limpar o formulário -->

      <input type="reset" value="Limpar" />

      <br />

      <label for="checkbox">Aceitos os termos:</label>
      <input type="checkbox" name="termos" id="" />
      <br /><br />
      <input type="radio" name="genero" id="masculino" />
      <label for="masculino">Masculino</label>
      <br />
      <input type="radio" name="genero" id="feminino" />
      <label for="feminino">Feminino</label>

      <!-- Type button usado para criar botões personalizados -->

      <input type="button" value="Botao" onclick="alert('Botao clicado!')" />

      <br /><br />

      <label for="mensagem">Mensagem:</label>
      <textarea name="mensagem" id="Mensagem" rows="5"> </textarea>

      <br /><br />

      <label for="cidade">Cidade:</label>
      <select name="cidade" id="cidade">
        <option value="saopaulo">São Paulo</option>
        <option value="rio">Rio de Janeiro</option>
        <option value="salvador">Salvador</option>
        <option value="brasilia">Brasília</option>
        <option value="beloHorizonte">Belo Horizonte</option>
      </select>
      <br /><br />

      <label for="linguagens">Linguagens de Programação:</label>
      <select name="linguages" multiple size="6" id="linguages">
        <option value="c#">C#</option>
        <option value="python">Python</option>
        <option value="java">Java</option>
        <option value="javascript">JavaScript</option>
        <option value="ruby">Ruby</option>
        <option value="php">PHP</option>
      </select>
      <br /><br />

      <input
        list="navegadores"
        name="navegador"
        placeholder="Digite um navegador"
      />
      <datalist id="navegadores">
        <option value="Google Chrome"></option>
        <option value="Mozilla Firefox"></option>
        <option value="Microsoft Edge"></option>
        <option value="Safari"></option>
        <option value="Opera"></option>
      </datalist>

      <br /><br />

      <fieldset>
        <legend>Dados do Cliente</legend>
        <label for="Nome">Nome:</label>
        <input type="text" name="nomeCliente" id="nomeCliente" />
        <br />
        <label for="Nome">Email:</label>
        <input type="text" name="emailCliente" id="emailCliente" />
      </fieldset>

      <br /><br />
      <input type="submit" value="Enviar" />
    </form>
  </body>
</html>
